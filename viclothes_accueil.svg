<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Helvetica Neue, Arial, sans-serif">

  <!-- FOND BLANC -->
  <rect width="1440" height="900" fill="#ffffff"/>

  <!-- ===== NAVBAR ===== -->
  <rect x="0" y="0" width="1440" height="60" fill="#ffffff"/>
  <line x1="0" y1="60" x2="1440" y2="60" stroke="#eeeeee" stroke-width="1"/>

  <!-- Gauche : Accueil + Vêtements -->
  <text x="30" y="37" font-size="12" font-weight="700" fill="#111111">Accueil</text>
  <text x="100" y="37" font-size="12" font-weight="700" fill="#111111">Vêtements</text>

  <!-- Centre : VI CLOTHES -->
  <text x="720" y="33" font-size="16" font-weight="700" fill="#111111" letter-spacing="3" text-anchor="middle">VI CLOTHES</text>
  <text x="720" y="48" font-size="8" fill="#111111" text-anchor="middle">✦</text>

  <!-- Droite : Recherche (bordure arrondie) -->
  <rect x="990" y="15" width="130" height="30" rx="15" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="1055" y="35" font-size="11" font-weight="700" fill="#111111" text-anchor="middle">Recherche 🔍</text>

  <!-- Droite : Bloc gris Service/Contact/À propos -->
  <rect x="1130" y="15" width="285" height="30" rx="15" fill="#bbbbbb"/>
  <text x="1175" y="35" font-size="11" font-weight="700" fill="#111111">Service</text>
  <text x="1245" y="35" font-size="11" font-weight="700" fill="#111111">Contact</text>
  <text x="1325" y="35" font-size="11" font-weight="700" fill="#111111">À propos</text>

  <!-- ===== HERO BANNIÈRE ===== -->
  <rect x="0" y="60" width="1440" height="400" fill="#2a2a2a"/>
  <!-- Overlay dégradé simulé -->
  <rect x="0" y="60" width="700" height="400" fill="#000000" opacity="0.6"/>
  <rect x="700" y="60" width="740" height="400" fill="#000000" opacity="0.15"/>
  <!-- Placeholder image -->
  <text x="1080" y="270" font-size="13" fill="#555555" text-anchor="middle">[ Bannière image pleine largeur ]</text>

  <!-- Texte hero -->
  <text x="80" y="200" font-size="42" font-weight="700" fill="#ffffff">Le style,</text>
  <text x="80" y="255" font-size="42" font-weight="700" fill="#ffffff">c'est maintenant.</text>
  <text x="80" y="300" font-size="14" fill="#dddddd">Ne perdez pas de temps — commandez dès aujourd'hui</text>

  <!-- Bouton Commander -->
  <rect x="80" y="320" width="150" height="38" rx="4" fill="#ffffff"/>
  <text x="155" y="344" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">Commander</text>

  <!-- ===== SECTION MEILLEURES VENTES ===== -->
  <rect x="0" y="460" width="1440" height="440" fill="#ffffff"/>

  <!-- Titre -->
  <text x="720" y="510" font-size="16" font-weight="700" fill="#111111" text-anchor="middle" letter-spacing="1">Meilleures ventes</text>

  <!-- Card 1 -->
  <rect x="80" y="530" width="400" height="280" rx="6" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <rect x="80" y="530" width="400" height="200" rx="6" fill="#f5f5f5"/>
  <text x="280" y="635" font-size="12" fill="#cccccc" text-anchor="middle">[ Image ]</text>
  <text x="100" y="755" font-size="13" font-weight="700" fill="#111111">Vêtement A</text>
  <text x="100" y="778" font-size="12" fill="#888888">XX,XX €</text>

  <!-- Card 2 -->
  <rect x="520" y="530" width="400" height="280" rx="6" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <rect x="520" y="530" width="400" height="200" rx="6" fill="#f5f5f5"/>
  <text x="720" y="635" font-size="12" fill="#cccccc" text-anchor="middle">[ Image ]</text>
  <text x="540" y="755" font-size="13" font-weight="700" fill="#111111">Vêtement B</text>
  <text x="540" y="778" font-size="12" fill="#888888">XX,XX €</text>

  <!-- Card 3 -->
  <rect x="960" y="530" width="400" height="280" rx="6" fill="#ffffff" stroke="#eeeeee" stroke-width="1"/>
  <rect x="960" y="530" width="400" height="200" rx="6" fill="#f5f5f5"/>
  <text x="1160" y="635" font-size="12" fill="#cccccc" text-anchor="middle">[ Image ]</text>
  <text x="980" y="755" font-size="13" font-weight="700" fill="#111111">Accessoire C</text>
  <text x="980" y="778" font-size="12" fill="#888888">XX,XX €</text>

  <!-- Bouton AFFICHER PLUS -->
  <rect x="570" y="840" width="300" height="38" rx="4" fill="none" stroke="#888888" stroke-width="2"/>
  <text x="720" y="864" font-size="12" font-weight="700" fill="#333333" text-anchor="middle" letter-spacing="1">AFFICHER PLUS</text>

</svg>
