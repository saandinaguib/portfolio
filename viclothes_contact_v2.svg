<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="1440" height="900" fill="#f5f5f5"/>
  <!-- NAVBAR -->
  <rect x="0" y="0" width="1440" height="55" fill="#ffffff"/>
  <line x1="0" y1="55" x2="1440" y2="55" stroke="#e8e8e8" stroke-width="1"/>
  <text x="30" y="34" font-size="13" font-weight="500" fill="#111">Accueil</text>
  <text x="110" y="34" font-size="13" font-weight="500" fill="#111">Vêtements</text>
  <text x="720" y="30" font-size="17" font-weight="700" fill="#111" letter-spacing="4" text-anchor="middle">VI CLOTHES</text>
  <text x="720" y="46" font-size="7" fill="#888" text-anchor="middle">•</text>
  <rect x="960" y="16" width="145" height="28" rx="14" fill="none" stroke="#111" stroke-width="1.5"/>
  <text x="1033" y="34" font-size="12" fill="#111" text-anchor="middle">Recherche 🔍</text>
  <rect x="1118" y="16" width="300" height="28" rx="14" fill="#c8c8c8"/>
  <text x="1163" y="34" font-size="12" fill="#111">Service</text>
  <text x="1230" y="34" font-size="12" fill="#111">Contact</text>
  <text x="1310" y="34" font-size="12" fill="#111">À propos</text>

  <!-- TITRE PAGE -->
  <rect x="0" y="55" width="1440" height="100" fill="#f5f5f5"/>
  <text x="720" y="108" font-size="28" font-weight="700" fill="#111" text-anchor="middle" letter-spacing="1">NOUS CONTACTER</text>
  <line x1="660" y1="122" x2="780" y2="122" stroke="#111" stroke-width="1.5"/>

  <!-- COLONNE GAUCHE : FORMULAIRE -->
  <rect x="80" y="175" width="720" height="700" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Titre formulaire -->
  <text x="120" y="225" font-size="18" font-weight="700" fill="#111">Nous écrire</text>
  <text x="120" y="248" font-size="12" fill="#888">Remplissez le formulaire, nous vous répondrons sous 24h.</text>

  <!-- Champ Sujet -->
  <text x="120" y="285" font-size="11" font-weight="600" fill="#555" letter-spacing="1">SUJET *</text>
  <rect x="120" y="293" width="640" height="44" rx="4" fill="#f8f8f8" stroke="#d0d0d0" stroke-width="1"/>
  <text x="136" y="320" font-size="13" fill="#bbb">Objet de votre message</text>

  <!-- Champ Prénom + Nom -->
  <text x="120" y="362" font-size="11" font-weight="600" fill="#555" letter-spacing="1">PRÉNOM *</text>
  <rect x="120" y="370" width="308" height="44" rx="4" fill="#f8f8f8" stroke="#d0d0d0" stroke-width="1"/>
  <text x="136" y="397" font-size="13" fill="#bbb">Votre prénom</text>

  <text x="452" y="362" font-size="11" font-weight="600" fill="#555" letter-spacing="1">NOM *</text>
  <rect x="452" y="370" width="308" height="44" rx="4" fill="#f8f8f8" stroke="#d0d0d0" stroke-width="1"/>
  <text x="468" y="397" font-size="13" fill="#bbb">Votre nom</text>

  <!-- Champ Email -->
  <text x="120" y="438" font-size="11" font-weight="600" fill="#555" letter-spacing="1">EMAIL *</text>
  <rect x="120" y="446" width="640" height="44" rx="4" fill="#f8f8f8" stroke="#d0d0d0" stroke-width="1"/>
  <text x="136" y="473" font-size="13" fill="#bbb">votre@email.com</text>

  <!-- Champ Téléphone -->
  <text x="120" y="514" font-size="11" font-weight="600" fill="#555" letter-spacing="1">TÉLÉPHONE *</text>
  <rect x="120" y="522" width="640" height="44" rx="4" fill="#f8f8f8" stroke="#d0d0d0" stroke-width="1"/>
  <text x="136" y="549" font-size="13" fill="#bbb">+33 X XX XX XX XX</text>

  <!-- Champ Message -->
  <text x="120" y="590" font-size="11" font-weight="600" fill="#555" letter-spacing="1">MESSAGE *</text>
  <rect x="120" y="598" width="640" height="160" rx="4" fill="#f8f8f8" stroke="#d0d0d0" stroke-width="1"/>
  <text x="136" y="625" font-size="13" fill="#bbb">Votre message...</text>

  <!-- Bouton Envoyer -->
  <rect x="120" y="784" width="200" height="46" rx="4" fill="#111"/>
  <text x="220" y="812" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Envoyer →</text>

  <!-- COLONNE DROITE : INFOS -->
  <rect x="840" y="175" width="520" height="700" rx="8" fill="#111" stroke="#111" stroke-width="1"/>

  <!-- Titre infos -->
  <text x="880" y="240" font-size="18" font-weight="700" fill="#fff">Informations</text>
  <line x1="880" y1="254" x2="1000" y2="254" stroke="#444" stroke-width="1"/>

  <!-- Adresse -->
  <text x="880" y="300" font-size="11" font-weight="600" fill="#888" letter-spacing="2">ADRESSE</text>
  <text x="880" y="324" font-size="14" fill="#fff">2 Rue Georges Lyvet</text>
  <text x="880" y="344" font-size="14" fill="#aaa">69200 Vénissieux</text>

  <!-- Ligne séparatrice -->
  <line x1="880" y1="375" x2="1320" y2="375" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Email -->
  <text x="880" y="410" font-size="11" font-weight="600" fill="#888" letter-spacing="2">EMAIL</text>
  <text x="880" y="434" font-size="14" fill="#fff">Rayanlepori@icloud.com</text>

  <!-- Ligne séparatrice -->
  <line x1="880" y1="462" x2="1320" y2="462" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Téléphone -->
  <text x="880" y="497" font-size="11" font-weight="600" fill="#888" letter-spacing="2">TÉLÉPHONE</text>
  <text x="880" y="521" font-size="14" fill="#fff">07 69 15 42 89</text>

  <!-- Ligne séparatrice -->
  <line x1="880" y1="549" x2="1320" y2="549" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Horaires -->
  <text x="880" y="584" font-size="11" font-weight="600" fill="#888" letter-spacing="2">DISPONIBILITÉ</text>
  <text x="880" y="608" font-size="14" fill="#fff">Lun — Ven : 9h00 – 18h00</text>
  <text x="880" y="630" font-size="13" fill="#aaa">Réponse sous 24h ouvrées</text>

  <!-- Ligne séparatrice -->
  <line x1="880" y1="658" x2="1320" y2="658" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Réseaux -->
  <text x="880" y="693" font-size="11" font-weight="600" fill="#888" letter-spacing="2">RÉSEAUX SOCIAUX</text>
  <rect x="880" y="706" width="120" height="36" rx="4" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="940" y="729" font-size="12" fill="#fff" text-anchor="middle">Instagram</text>
  <rect x="1012" y="706" width="100" height="36" rx="4" fill="#222" stroke="#333" stroke-width="1"/>
  <text x="1062" y="729" font-size="12" fill="#fff" text-anchor="middle">TikTok</text>

</svg>