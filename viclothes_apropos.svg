<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Helvetica Neue, Arial, sans-serif">

  <!-- FOND BLANC -->
  <rect width="1440" height="900" fill="#ffffff"/>

  <!-- ===== NAVBAR ===== -->
  <rect x="0" y="0" width="1440" height="60" fill="#ffffff"/>
  <line x1="0" y1="60" x2="1440" y2="60" stroke="#eeeeee" stroke-width="1"/>

  <text x="30" y="37" font-size="12" font-weight="700" fill="#111111">Accueil</text>
  <text x="100" y="37" font-size="12" font-weight="700" fill="#111111">Vêtements</text>

  <text x="720" y="33" font-size="16" font-weight="700" fill="#111111" letter-spacing="3" text-anchor="middle">VI CLOTHES</text>
  <text x="720" y="48" font-size="8" fill="#111111" text-anchor="middle">✦</text>

  <rect x="990" y="15" width="130" height="30" rx="15" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="1055" y="35" font-size="11" font-weight="700" fill="#111111" text-anchor="middle">Recherche 🔍</text>

  <rect x="1130" y="15" width="285" height="30" rx="15" fill="#bbbbbb"/>
  <text x="1175" y="35" font-size="11" font-weight="700" fill="#111111">Service</text>
  <text x="1245" y="35" font-size="11" font-weight="700" fill="#111111">Contact</text>
  <text x="1325" y="35" font-size="11" font-weight="700" fill="#111111">À propos</text>

  <!-- ===== COLONNE GAUCHE ===== -->
  <!-- Titre À propos + soulignement -->
  <text x="80" y="130" font-size="28" font-weight="700" fill="#111111">À propos</text>
  <line x1="80" y1="138" x2="220" y2="138" stroke="#111111" stroke-width="2.5"/>

  <!-- Description -->
  <text x="80" y="175" font-size="12" fill="#555555">Chez VI CLOTHES, nous croyons que le style est</text>
  <text x="80" y="195" font-size="12" fill="#555555">bien plus qu'une apparence. Chaque pièce est</text>
  <text x="80" y="215" font-size="12" fill="#555555">sélectionnée avec soin pour allier confort,</text>
  <text x="80" y="235" font-size="12" fill="#555555">tendance et qualité.</text>

  <!-- Ligne verticale séparatrice -->
  <line x1="440" y1="90" x2="440" y2="820" stroke="#eeeeee" stroke-width="1"/>

  <!-- ===== COLONNE DROITE ===== -->

  <!-- Notre vision -->
  <text x="490" y="130" font-size="14" font-weight="700" fill="#111111">Notre vision</text>
  <line x1="490" y1="138" x2="490" y2="138"/>

  <!-- Puce 1 -->
  <circle cx="500" cy="163" r="3" fill="#111111"/>
  <text x="515" y="168" font-size="12" fill="#555555">Offrir des pièces tendance et accessibles</text>
  <!-- Puce 2 -->
  <circle cx="500" cy="193" r="3" fill="#111111"/>
  <text x="515" y="198" font-size="12" fill="#555555">Proposer une mode pour tous les styles</text>
  <!-- Puce 3 -->
  <circle cx="500" cy="223" r="3" fill="#111111"/>
  <text x="515" y="228" font-size="12" fill="#555555">Inspirer confiance à travers chaque collection</text>

  <!-- Notre savoir-faire -->
  <text x="870" y="130" font-size="14" font-weight="700" fill="#111111">Notre savoir-faire</text>

  <!-- Puce 1 -->
  <circle cx="880" cy="163" r="3" fill="#111111"/>
  <text x="895" y="168" font-size="12" fill="#555555">Sélection rigoureuse des articles</text>
  <!-- Puce 2 -->
  <circle cx="880" cy="193" r="3" fill="#111111"/>
  <text x="895" y="198" font-size="12" fill="#555555">Livraison rapide et soignée</text>
  <!-- Puce 3 -->
  <circle cx="880" cy="223" r="3" fill="#111111"/>
  <text x="895" y="228" font-size="12" fill="#555555">Service client réactif</text>

  <!-- Ligne séparatrice horizontale -->
  <line x1="490" y1="270" x2="1380" y2="270" stroke="#eeeeee" stroke-width="1"/>

  <!-- Pourquoi nous choisir -->
  <text x="490" y="310" font-size="14" font-weight="700" fill="#111111">Pourquoi nous choisir</text>
  <text x="490" y="340" font-size="12" fill="#555555">Choisir VI CLOTHES, c'est choisir plus qu'un vêtement. C'est affirmer un style,</text>
  <text x="490" y="360" font-size="12" fill="#555555">une personnalité et une vision de la mode. Nos collections s'adressent à ceux</text>
  <text x="490" y="380" font-size="12" fill="#555555">qui recherchent l'équilibre parfait entre tendance et confort.</text>

</svg>
