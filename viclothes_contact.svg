  <text x="900" y="250" font-size="14" fill="#333333">📍  2 Rue Georges Lyvet</text>
  <text x="928" y="272" font-size="13" fill="#888888">69200 Vénissieux</text>

  <!-- Email -->
  <text x="900" y="320" font-size="14" fill="#333333">✉️  Rayanlepori@icloud.com</text>

